<div class="app-container">

  <mat-toolbar color="primary" class="app-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()" matTooltip="ナビゲーションを開閉">
      <mat-icon>menu</mat-icon>
    </button>
    <span>{{ title }}</span>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">

    <mat-sidenav #sidenav mode="side" opened class="sidenav">
      <div class="sidenav-content-wrapper">
        <mat-nav-list class="main-nav-list">
          <a mat-list-item *ngFor="let feature of features" [routerLink]="feature.path" routerLinkActive="active-link">
            <mat-icon matListItemIcon>{{ feature.icon }}</mat-icon>
            <span matListItemTitle>{{ feature.name }}</span>
          </a>
        </mat-nav-list>

        <div class="spacer"></div>

        <mat-nav-list class="settings-nav-list">
          <a mat-list-item [routerLink]="settings.path" routerLinkActive="active-link">
            <mat-icon matListItemIcon>{{ settings.icon }}</mat-icon>
            <span matListItemTitle>{{ settings.name }}</span>
          </a>
        </mat-nav-list>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>

  </mat-sidenav-container>
</div>
